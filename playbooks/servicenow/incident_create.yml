---
# =========================================================================
# Playbook: Criar Incidente no ServiceNow
# =========================================================================
# Variáveis para AAP Survey:
#   sn_short_description - Descrição curta do incidente
#   sn_description       - Descrição detalhada do incidente
#   sn_impact            - Impacto (low, medium, high)
#   sn_urgency           - Urgência (low, medium, high)
# Credenciais (AAP): snow_* (extra_vars) | SNOW_* (tipo nativo) | SN_* + injector custom
# =========================================================================
- name: Criar incidente no ServiceNow
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    sn_short_description: ""
    sn_description: ""
    sn_impact: "low"
    sn_urgency: "low"
    _sn_url: "{{ snow_host | default(SNOW_INSTANCE | default(SN_HOST | default(''))) }}"
    _sn_user: "{{ snow_username | default(SNOW_USERNAME | default(SN_USERNAME | default(''))) }}"
    _sn_pass: "{{ snow_password | default(SNOW_PASSWORD | default(SN_PASSWORD | default(''))) }}"

  tasks:
    - name: Criar novo incidente no ServiceNow
      servicenow.itsm.incident:
        state: new
        instance:
          host: "{{ _sn_url }}"
          username: "{{ _sn_user }}"
          password: "{{ _sn_pass }}"
        caller: "{{ _sn_user }}"
        short_description: "{{ sn_short_description }}"
        description: "{{ sn_description }}"
        impact: "{{ sn_impact }}"
        urgency: "{{ sn_urgency }}"
      register: new_incident
      tags:
        - servicenow
        - incident
        - create

    - name: Registrar número do incidente criado
      ansible.builtin.set_fact:
        sn_incident_number: "{{ new_incident.record.number }}"
      tags:
        - servicenow
        - incident

    - name: Exibir número do incidente criado
      ansible.builtin.debug:
        var: new_incident.record.number
      tags:
        - servicenow
        - incident
        - debug

    - name: Exportar número do incidente para workflow
      ansible.builtin.set_stats:
        data:
          sn_incident_number: "{{ new_incident.record.number }}"
      tags:
        - servicenow
        - incident
        - workflow
