---
# =========================================================================
# Playbook: Fechar Incidente no ServiceNow
# =========================================================================
# Variáveis para AAP Survey:
#   sn_incident_number  - Número do incidente a ser fechado (ex: INC0010001)
#   sn_close_code       - Código de fechamento (default: "Solved (Work Around)")
#   sn_close_notes      - Notas de fechamento (preenchido automaticamente)
#   ac_job_id           - ID do job no AAP (injetado automaticamente)
# Credenciais (AAP): snow_* | SNOW_* (tipo nativo) | SN_* + injector custom
# =========================================================================
- name: Fechar incidente no ServiceNow
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    sn_close_code: "Solved (Work Around)"
    sn_close_notes: >-
      This incident has been resolved through automated means via EDA Ansible,
      Job ID: {{ ac_job_id | default('0') }}.
      As a result, the ticket will now be marked as closed.
    sn_incident_number: "{{ sn_incident_number }}"
    _sn_url: "{{ snow_host | default(SNOW_INSTANCE | default(SN_HOST | default(''))) }}"
    _sn_user: "{{ snow_username | default(SNOW_USERNAME | default(SN_USERNAME | default(''))) }}"
    _sn_pass: "{{ snow_password | default(SNOW_PASSWORD | default(SN_PASSWORD | default(''))) }}"

  tasks:
    - name: Fechar incidente {{ sn_incident_number }}
      servicenow.itsm.incident:
        instance:
          host: "{{ _sn_url }}"
          username: "{{ _sn_user }}"
          password: "{{ _sn_pass }}"
        state: closed
        close_code: "{{ sn_close_code }}"
        close_notes: "{{ sn_close_notes }}"
        number: "{{ sn_incident_number }}"
        other:
          work_notes: "{{ sn_close_notes }}"
      tags:
        - servicenow
        - incident
        - close

    - name: Exibir link do job de self-healing
      ansible.builtin.debug:
        msg: "Job URL: {{ ac_job_id | default('0') }}"
      tags:
        - servicenow
        - incident
        - debug

    - name: Exportar variáveis para workflow
      ansible.builtin.set_stats:
        data:
          sn_incident_number: "{{ sn_incident_number }}"
          sn_incident_status: "closed"
      tags:
        - servicenow
        - incident
        - workflow
