---
# =========================================================================
# Playbook: Fechar Change Request no ServiceNow
# =========================================================================
# Variáveis para AAP Survey:
#   sn_change_request_number - Número da change a ser fechada (ex: CHG0010001)
#   sn_closure_code          - Código de fechamento (default: "successful")
#   sn_closure_notes         - Notas de fechamento
# Credenciais: snow_* | SNOW_* (tipo nativo AAP) | SN_* + injector custom
# =========================================================================
- name: Fechar change request no ServiceNow
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    sn_change_request_number: "{{ sn_change_request_number }}"
    sn_closure_code: "successful"
    sn_closure_notes: "Change successfully implemented - Job ID: {{ awx_job_id | default('0') }}"
    _sn_url: "{{ snow_host | default(SNOW_INSTANCE | default(SN_HOST | default(''))) }}"
    _sn_user: "{{ snow_username | default(SNOW_USERNAME | default(SN_USERNAME | default(''))) }}"
    _sn_pass: "{{ snow_password | default(SNOW_PASSWORD | default(SN_PASSWORD | default(''))) }}"

  tasks:
    - name: Fechar change request {{ sn_change_request_number }}
      servicenow.itsm.change_request:
        state: closed
        instance:
          host: "{{ _sn_url }}"
          username: "{{ _sn_user }}"
          password: "{{ _sn_pass }}"
        number: "{{ sn_change_request_number }}"
        close_code: "{{ sn_closure_code }}"
        close_notes: "{{ sn_closure_notes }}"
      tags:
        - servicenow
        - change
        - close

    - name: Exibir confirmação de fechamento da change request
      ansible.builtin.debug:
        msg: "Change Request {{ sn_change_request_number }} closed successfully by Ansible"
      tags:
        - servicenow
        - change
        - debug

    - name: Exportar variáveis para workflow
      ansible.builtin.set_stats:
        data:
          sn_change_request_number: "{{ sn_change_request_number }}"
          sn_change_status: "closed"
      tags:
        - servicenow
        - change
        - workflow
