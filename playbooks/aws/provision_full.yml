---
# Playbook: Provisionamento completo AWS (infra + EC2)
# Baseado em: provisioning-aws-full.yml
# Descricao: Executa provisionamento completo — VPC, SG, key pair + instancias EC2
#
# Variaveis Survey AAP:
#   - ec2_server_name: Nome base das instancias (default: server)
#   - ec2_instance_size: Tipo da instancia (t2.micro | t2.small | t2.medium)
#   - ec2_quantity: Quantidade de instancias (default: 1)
#   - ec2_server_role: Tag Role (default: webserver)
#   - ec2_server_group: Tag Group (default: lab)
#   - aws_region: Regiao AWS (default: us-east-2)

- name: "[1/2] Infraestrutura base — VPC, SG, SSH key"
  ansible.builtin.import_playbook: provision_infra.yml

- name: "[2/2] Compute — Instancias EC2 RHEL"
  ansible.builtin.import_playbook: provision_ec2.yml
