---
# Playbook: Atualizar credenciais AWS no AAP
# Survey vars: aws_access_key_id, aws_secret_access_key
# Atualiza as credenciais CRED-SSH-AWS-ROQUE (org ROQUE) e CRED-SSH-AWS-SRE (org SRE)

- name: Atualizar credenciais AWS no Ansible Automation Platform
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_credentials:
      - name: CRED-SSH-AWS-ROQUE
        organization: ROQUE
      - name: CRED-SSH-AWS-SRE
        organization: SRE

  tasks:
    - name: Validar que as variáveis AWS foram informadas
      ansible.builtin.assert:
        that:
          - aws_access_key_id is defined
          - aws_access_key_id | length > 0
          - aws_secret_access_key is defined
          - aws_secret_access_key | length > 0
        fail_msg: "As variáveis aws_access_key_id e aws_secret_access_key são obrigatórias"
        success_msg: "Variáveis AWS validadas com sucesso"

    - name: Atualizar credencial AWS - {{ item.name }} ({{ item.organization }})
      ansible.controller.credential:
        name: "{{ item.name }}"
        organization: "{{ item.organization }}"
        credential_type: "Amazon Web Services"
        inputs:
          username: "{{ aws_access_key_id }}"
          password: "{{ aws_secret_access_key }}"
        state: present
        controller_host: "{{ controller_host | default(omit) }}"
        controller_username: "{{ controller_username | default(omit) }}"
        controller_password: "{{ controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_validate_certs | default(false) }}"
      loop: "{{ aws_credentials }}"
      loop_control:
        label: "{{ item.name }} ({{ item.organization }})"
      no_log: true
