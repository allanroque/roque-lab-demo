---
# Playbook: Destruir todos os recursos AWS do projeto
# Baseado em: teardown-aws.yml
# Descricao: Remove TODOS os recursos criados pelo projeto (IRREVERSIVEL)
#
# Variaveis Survey AAP:
#   - confirm_destroy: Confirmacao de destruicao (yes/no, default: no)
#   - aws_region: Regiao AWS (default: us-east-2)
#   - project_name: Nome do projeto (default: ansible-aws-lab)
- name: Destruir infraestrutura AWS
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    project_name: ansible-aws-lab
    deploy_env: lab
    aws_region: us-east-2
    vpc_name: "{{ project_name }}-vpc"
    vpc_cidr: "10.10.0.0/16"
    sg_name: "{{ project_name }}-sg"
    ec2_key_name: "{{ project_name }}-key"
    route_table_name: "{{ project_name }}-public-rt"
    confirm_destroy: "no"

  pre_tasks:
    - name: Validar confirmacao de destruicao
      ansible.builtin.assert:
        that: confirm_destroy == "yes"
        fail_msg: >
          Verificacao de seguranca falhou.
          Passe -e "confirm_destroy=yes" para confirmar a destruicao dos recursos.
      tags:
        - aws
        - teardown

    - name: Localizar VPC
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ vpc_name }}"
      register: vpc_info
      tags:
        - aws
        - teardown

    - name: Abortar se VPC nao encontrada
      ansible.builtin.meta: end_play
      when: vpc_info.vpcs | length == 0

    - name: Definir VPC ID
      ansible.builtin.set_fact:
        vpc_id: "{{ vpc_info.vpcs[0].vpc_id }}"
      tags:
        - aws
        - teardown

  tasks:
    - name: Terminar TODAS as instancias EC2 do projeto
      amazon.aws.ec2_instance:
        region: "{{ aws_region }}"
        state: absent
        filters:
          "tag:Project": "{{ project_name }}"
          instance-state-name:
            - running
            - stopped
            - pending
      tags:
        - aws
        - ec2
        - teardown

    - name: Remover key pair SSH
      amazon.aws.ec2_key:
        name: "{{ ec2_key_name }}"
        region: "{{ aws_region }}"
        state: absent
      tags:
        - aws
        - ec2
        - teardown

    - name: Remover security group
      amazon.aws.ec2_security_group:
        name: "{{ sg_name }}"
        region: "{{ aws_region }}"
        vpc_id: "{{ vpc_id }}"
        state: absent
      tags:
        - aws
        - security_group
        - teardown

    - name: Remover route tables (non-main)
      amazon.aws.ec2_vpc_route_table:
        region: "{{ aws_region }}"
        vpc_id: "{{ vpc_id }}"
        tags:
          Name: "{{ route_table_name }}"
        state: absent
      tags:
        - aws
        - vpc
        - teardown

    - name: Remover Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc_id }}"
        region: "{{ aws_region }}"
        state: absent
      tags:
        - aws
        - vpc
        - teardown

    - name: Listar subnets na VPC
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ aws_region }}"
        filters:
          vpc-id: "{{ vpc_id }}"
      register: subnet_info
      tags:
        - aws
        - vpc
        - teardown

    - name: Remover subnets
      amazon.aws.ec2_vpc_subnet:
        region: "{{ aws_region }}"
        vpc_id: "{{ vpc_id }}"
        cidr: "{{ item.cidr_block }}"
        state: absent
      loop: "{{ subnet_info.subnets }}"
      tags:
        - aws
        - vpc
        - teardown

    - name: Remover VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ aws_region }}"
        state: absent
      tags:
        - aws
        - vpc
        - teardown

  post_tasks:
    - name: Teardown completo
      ansible.builtin.debug:
        msg: "Todos os recursos do projeto '{{ project_name }}' foram removidos."
      tags:
        - aws
        - teardown

    - name: Exportar status do teardown para workflow (set_stats)
      ansible.builtin.set_stats:
        aggregate: false
        data:
          stats_teardown_status: "completed"
          stats_project_name: "{{ project_name }}"
          stats_aws_region: "{{ aws_region }}"
          stats_phase: "destroyed"
      tags:
        - aws
        - teardown
