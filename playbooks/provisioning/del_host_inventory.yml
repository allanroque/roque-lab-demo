---
# =============================================================================
# Playbook: Remover host do inventario do AAP
# Descricao: Remove o host do inventario INV-ROQUE-LAB via API REST
#
# Variaveis para Survey do AAP (ou recebidas via set_stats do workflow):
#   host_name        - Nome curto do host (ex: server10) [obrigatorio]
#   host_domain      - Dominio do host (default: aroque.com.br)
#
# Credenciais: Red Hat Ansible Automation Platform (tipo nativo, id: 16)
#   Injeta: controller_host, controller_username, controller_password
# =============================================================================
- name: Remover host do inventario do AAP
  hosts: localhost
  gather_facts: false

  vars:
    host_name: ""
    host_domain: "aroque.com.br"
    aap_inventory: "INV-ROQUE-LAB"
    aap_base_url: "https://{{ controller_host }}/api/v2"

  tasks:
    - name: Validar variavel obrigatoria
      ansible.builtin.assert:
        that:
          - host_name | length > 0
        fail_msg: "A variavel host_name e obrigatoria"
        quiet: true
      tags:
        - provisioning
        - inventory
        - validate

    - name: Construir FQDN do host
      ansible.builtin.set_fact:
        host_fqdn: "{{ host_name.split('.')[0] }}.{{ host_domain }}"
      tags:
        - provisioning
        - inventory

    # ── Obter inventario ─────────────────────────────────────────────────────
    - name: Obter inventario {{ aap_inventory }}
      ansible.builtin.uri:
        url: "{{ aap_base_url }}/inventories/?name={{ aap_inventory | urlencode }}"
        method: GET
        url_username: "{{ controller_username }}"
        url_password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: inv_result
      tags:
        - provisioning
        - inventory

    - name: Registrar ID do inventario
      ansible.builtin.set_fact:
        inv_id: "{{ inv_result.json.results[0].id }}"
      tags:
        - provisioning
        - inventory

    # ── Localizar host ───────────────────────────────────────────────────────
    - name: Localizar host {{ host_fqdn }} no inventario
      ansible.builtin.uri:
        url: "{{ aap_base_url }}/inventories/{{ inv_id }}/hosts/?name={{ host_fqdn | urlencode }}"
        method: GET
        url_username: "{{ controller_username }}"
        url_password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: host_info
      tags:
        - provisioning
        - inventory

    - name: Validar que host existe
      ansible.builtin.assert:
        that:
          - host_info.json.count > 0
        fail_msg: "Host '{{ host_fqdn }}' nao encontrado no inventario '{{ aap_inventory }}'"
        quiet: true
      tags:
        - provisioning
        - inventory

    - name: Registrar ID do host
      ansible.builtin.set_fact:
        aap_host_id: "{{ host_info.json.results[0].id }}"
      tags:
        - provisioning
        - inventory

    # ── Remover host ─────────────────────────────────────────────────────────
    - name: Remover host {{ host_fqdn }} do inventario
      ansible.builtin.uri:
        url: "{{ aap_base_url }}/hosts/{{ aap_host_id }}/"
        method: DELETE
        url_username: "{{ controller_username }}"
        url_password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code:
          - 200
          - 204
      tags:
        - provisioning
        - inventory
        - host

    # ── Resumo ───────────────────────────────────────────────────────────────
    - name: Exibir resultado
      ansible.builtin.debug:
        msg: "Host {{ host_fqdn }} (id: {{ aap_host_id }}) removido do inventario {{ aap_inventory }}"
      tags:
        - provisioning
        - inventory

    - name: Exportar dados para proximo job template
      ansible.builtin.set_stats:
        data:
          host_name: "{{ host_name }}"
          host_fqdn: "{{ host_fqdn }}"
          aap_inventory: "{{ aap_inventory }}"
          inventory_host_removed: true
          sn_short_description: "Removed {{ host_fqdn }} from inventory {{ aap_inventory }}"
      tags:
        - provisioning
        - inventory
        - export
