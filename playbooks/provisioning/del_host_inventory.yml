---
# =============================================================================
# Playbook: Remover host do inventario do AAP
# Descricao: Remove o host do inventario INV-ROQUE-LAB
#
# Variaveis para Survey do AAP (ou recebidas via set_stats do workflow):
#   host_name        - Nome curto do host (ex: server10) [obrigatorio]
#   host_domain      - Dominio do host (default: aroque.com.br)
#
# Credenciais: Red Hat Ansible Automation Platform (tipo nativo, id: 16)
#   Injeta env vars: CONTROLLER_HOST, CONTROLLER_USERNAME, CONTROLLER_PASSWORD
#   Collection ansible.controller usa essas env vars automaticamente
# =============================================================================
- name: Remover host do inventario do AAP
  hosts: localhost
  gather_facts: false
  environment:
    CONTROLLER_VERIFY_SSL: "false"

  vars:
    host_name: ""
    host_domain: "aroque.com.br"
    aap_inventory: "INV-ROQUE-LAB"

  tasks:
    - name: Validar variavel obrigatoria
      ansible.builtin.assert:
        that:
          - host_name | length > 0
        fail_msg: "A variavel host_name e obrigatoria"
        quiet: true
      tags:
        - provisioning
        - inventory
        - validate

    - name: Construir FQDN do host
      ansible.builtin.set_fact:
        _fqdn: "{{ host_name.split('.')[0] }}.{{ host_domain }}"
      tags:
        - provisioning
        - inventory

    - name: Remover host {{ _fqdn }} do inventario {{ aap_inventory }}
      ansible.controller.host:
        name: "{{ _fqdn }}"
        inventory: "{{ aap_inventory }}"
        state: absent
      tags:
        - provisioning
        - inventory
        - host

    - name: Exibir resultado
      ansible.builtin.debug:
        msg: "Host {{ _fqdn }} removido do inventario {{ aap_inventory }}"
      tags:
        - provisioning
        - inventory

    - name: Exportar dados para proximo job template
      ansible.builtin.set_stats:
        data:
          host_name: "{{ host_name }}"
          host_fqdn: "{{ _fqdn }}"
          aap_inventory: "{{ aap_inventory }}"
          inventory_host_removed: true
          sn_short_description: "Removed {{ _fqdn }} from inventory {{ aap_inventory }}"
      tags:
        - provisioning
        - inventory
        - export
