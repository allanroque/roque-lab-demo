---
# =============================================================================
# Playbook: Provisionar VM no VMware Fusion via vmrest API
# Descricao: Clona template, configura recursos, liga a VM, configura rede
#
# Variaveis para Survey do AAP:
#   host_name        - Nome curto do host (ex: server03) [obrigatorio]
#   host_domain      - Dominio do host (default: aroque.com.br)
#   host_ip          - IP estatico do host (ex: 192.168.100.50) [obrigatorio]
#   host_description - Descricao do host (default: Provisioned by Ansible)
#   host_role        - Role/funcao do servidor (webserver | database | app | bastion)
#   host_group       - Grupo do servidor (lab | prod | staging)
#   host_env         - Ambiente (lab | dev | staging | production)
#   host_cpu         - Numero de vCPUs (default: 2)
#   host_memory      - Memoria RAM em MB (default: 2048)
#   host_disk        - Disco em GB (informativo para CMDB, default: 20)
#   vm_ssh_user      - Usuario SSH do template (default: ansible)
#   vm_ssh_pass      - Senha SSH do template (campo password no Survey)
#
# Credenciais (injetadas via CRED-VMWARE-ROQUE, credential type: VMware Fusion REST API):
#   vmrest_host      - IP do hypervisor (extra_vars via injector)
#   vmrest_port      - Porta do vmrest (extra_vars via injector, default: 8698)
#   vmrest_user      - Usuario vmrest (extra_vars via injector)
#   vmrest_password  - Senha vmrest (extra_vars via injector, secret)
# =============================================================================

# ── Play 1: Provisionar VM via vmrest API ─────────────────────────────────────
- name: Provisionar VM no VMware Fusion
  hosts: localhost
  gather_facts: false

  vars:
    host_name: ""
    host_domain: "aroque.com.br"
    host_ip: ""
    host_description: "Provisioned by Ansible"
    host_role: "webserver"
    host_group: "lab"
    host_env: "lab"
    host_cpu: 2
    host_memory: 2048
    host_disk: "20"
    vm_ssh_user: "ansible"
    vm_ssh_pass: ""
    vm_template_id: "FOVC332SCFEC425PKT21OGQM5UEETP0A"
    vmrest_base_url: "http://{{ vmrest_host }}:{{ vmrest_port }}/api"
    vmrest_content_type: "application/vnd.vmware.vmw.rest-v1+json"

  tasks:
    # ── Validacao ────────────────────────────────────────────────────────────
    - name: Validar variaveis obrigatorias
      ansible.builtin.assert:
        that:
          - host_name | length > 0
          - host_ip | length > 0
          - vmrest_user | length > 0
          - vmrest_password | length > 0
          - vm_ssh_pass | length > 0
        fail_msg: "As variaveis host_name, host_ip, vmrest_*, vm_ssh_pass sao obrigatorias"
        quiet: true
      tags:
        - provisioning
        - vmware
        - validate

    - name: Construir FQDN do host
      ansible.builtin.set_fact:
        host_fqdn: "{{ host_name.split('.')[0] }}.{{ host_domain }}"
      tags:
        - provisioning
        - vmware

    # ── Verificar se VM ja existe ────────────────────────────────────────────
    - name: Listar VMs existentes
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms"
        method: GET
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        return_content: true
      register: vm_list
      tags:
        - provisioning
        - vmware

    - name: Verificar se VM {{ host_fqdn }} ja existe
      ansible.builtin.set_fact:
        vm_exists: "{{ vm_list.json | selectattr('path', 'search', host_fqdn) | list | length > 0 }}"
        vm_existing_id: "{{ (vm_list.json | selectattr('path', 'search', host_fqdn) | list | first).id | default('') }}"
      tags:
        - provisioning
        - vmware

    - name: Informar que VM ja existe
      ansible.builtin.debug:
        msg: "VM {{ host_fqdn }} ja existe (ID: {{ vm_existing_id }}). Pulando clone."
      when: vm_exists | bool
      tags:
        - provisioning
        - vmware

    # ── Clonar template ──────────────────────────────────────────────────────
    - name: Clonar VM a partir do template
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms"
        method: POST
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "{{ vmrest_content_type }}"
        body: "{{ {'name': host_fqdn, 'parentId': vm_template_id} | to_json }}"
        status_code:
          - 200
          - 201
        return_content: true
      register: vm_clone
      when: not (vm_exists | bool)
      tags:
        - provisioning
        - vmware
        - clone

    - name: Registrar ID da VM
      ansible.builtin.set_fact:
        vm_id: "{{ vm_clone.json.id | default(vm_existing_id) }}"
      tags:
        - provisioning
        - vmware

    - name: Exibir resultado do clone
      ansible.builtin.debug:
        msg: "VM {{ host_fqdn }} clonada com sucesso (ID: {{ vm_id }})"
      when: not (vm_exists | bool)
      tags:
        - provisioning
        - vmware

    # ── Garantir VM desligada para configuracao ─────────────────────────────
    - name: Verificar estado da VM antes de configurar
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}/power"
        method: GET
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        return_content: true
      register: vm_pre_config_state
      tags:
        - provisioning
        - vmware
        - config

    - name: Desligar VM para aplicar configuracao de recursos
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}/power"
        method: PUT
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "{{ vmrest_content_type }}"
        body: "off"
        status_code:
          - 200
          - 201
        return_content: true
      when: vm_pre_config_state.json.power_state | default('') != 'poweredOff'
      tags:
        - provisioning
        - vmware
        - config

    - name: Aguardar VM desligar completamente
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}/power"
        method: GET
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        return_content: true
      register: vm_off_check
      until: vm_off_check.json.power_state | default('') == 'poweredOff'
      retries: 12
      delay: 5
      when: vm_pre_config_state.json.power_state | default('') != 'poweredOff'
      tags:
        - provisioning
        - vmware
        - config

    # ── Configurar recursos da VM ────────────────────────────────────────────
    - name: Configurar vCPUs ({{ host_cpu }}) e memoria ({{ host_memory }} MB)
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}"
        method: PUT
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "{{ vmrest_content_type }}"
        body: "{{ {'processors': host_cpu | int, 'memory': host_memory | int} | to_json }}"
        status_code:
          - 200
          - 201
        return_content: true
      register: vm_config
      tags:
        - provisioning
        - vmware
        - config

    # ── Ligar a VM ───────────────────────────────────────────────────────────
    - name: Verificar estado atual da VM
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}/power"
        method: GET
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        return_content: true
      register: vm_power_state
      tags:
        - provisioning
        - vmware

    - name: Ligar VM {{ host_fqdn }}
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}/power"
        method: PUT
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "{{ vmrest_content_type }}"
        body: "on"
        status_code:
          - 200
          - 201
        return_content: true
      when: vm_power_state.json.power_state | default('') != 'poweredOn'
      register: vm_power_on
      tags:
        - provisioning
        - vmware

    # ── Aguardar VM ficar acessivel ──────────────────────────────────────────
    - name: Aguardar VM obter IP via vmrest
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}/ip"
        method: GET
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        return_content: true
      register: vm_ip_result
      until: vm_ip_result.status == 200 and vm_ip_result.json.ip | default('') | length > 0
      retries: 30
      delay: 10
      tags:
        - provisioning
        - vmware

    - name: Registrar IP de boot da VM
      ansible.builtin.set_fact:
        vm_boot_ip: "{{ vm_ip_result.json.ip }}"
      tags:
        - provisioning
        - vmware

    - name: Aguardar SSH em {{ vm_boot_ip }}
      ansible.builtin.wait_for:
        host: "{{ vm_boot_ip }}"
        port: 22
        timeout: 120
        delay: 5
        state: started
      tags:
        - provisioning
        - vmware

    # ── Registrar VM para configuracao no Play 2 ─────────────────────────────
    - name: Adicionar VM ao inventario temporario com credenciais SSH
      ansible.builtin.add_host:
        name: "{{ vm_boot_ip }}"
        groups: vm_provisioned
        ansible_user: "{{ vm_ssh_user }}"
        ansible_password: "{{ vm_ssh_pass }}"
        ansible_become: true
        ansible_become_password: "{{ vm_ssh_pass }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        host_fqdn: "{{ host_fqdn }}"
        host_ip_target: "{{ host_ip }}"
      tags:
        - provisioning
        - vmware

    - name: Coletar detalhes da VM
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}"
        method: GET
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        return_content: true
      register: vm_details
      tags:
        - provisioning
        - vmware

    - name: Obter path da VM
      ansible.builtin.set_fact:
        vm_path: "{{ (vm_list.json | selectattr('id', 'equalto', vm_id) | list | first).path | default('') }}"
      tags:
        - provisioning
        - vmware

    - name: Exibir status — configurando rede
      ansible.builtin.debug:
        msg: "VM {{ host_fqdn }} online ({{ vm_boot_ip }}). Configurando hostname e IP {{ host_ip }}..."
      tags:
        - provisioning
        - vmware

# ── Play 2: Configurar hostname e IP estatico ─────────────────────────────────
# Credenciais SSH vem do add_host (vm_ssh_user/vm_ssh_pass da Survey)
- name: Configurar hostname e rede na VM
  hosts: vm_provisioned
  gather_facts: true
  become: true

  tasks:
    - name: Configurar hostname {{ host_fqdn }}
      ansible.builtin.hostname:
        name: "{{ host_fqdn }}"
      tags:
        - provisioning
        - vmware
        - config

    - name: Obter nome da conexao de rede ativa
      ansible.builtin.command:
        cmd: "nmcli -t -f NAME connection show --active"
      register: nm_connections
      changed_when: false
      tags:
        - provisioning
        - vmware
        - config

    - name: Registrar conexao de rede
      ansible.builtin.set_fact:
        net_connection: "{{ nm_connections.stdout_lines[0] }}"
      tags:
        - provisioning
        - vmware
        - config

    - name: "Configurar IP estatico {{ host_ip_target }}"
      ansible.builtin.command:
        cmd: >-
          nmcli connection modify "{{ net_connection }}"
          ipv4.addresses "{{ host_ip_target }}/24"
          ipv4.gateway "192.168.100.1"
          ipv4.dns "192.168.100.11"
          ipv4.method manual
          connection.autoconnect yes
      changed_when: true
      tags:
        - provisioning
        - vmware
        - config

    - name: Aplicar configuracao de rede
      ansible.builtin.command:
        cmd: "nmcli connection up '{{ net_connection }}'"
      async: 10
      poll: 0
      changed_when: true
      tags:
        - provisioning
        - vmware
        - config

    - name: Aguardar SSH no IP final {{ host_ip_target }}
      ansible.builtin.wait_for:
        host: "{{ host_ip_target }}"
        port: 22
        timeout: 120
        delay: 10
        state: started
      delegate_to: localhost
      become: false
      tags:
        - provisioning
        - vmware
        - validate

# ── Play 3: Resumo e exportacao ───────────────────────────────────────────────
- name: Exportar dados do provisionamento
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Registrar timestamp
      ansible.builtin.set_fact:
        provisioned_at: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
      tags:
        - provisioning
        - vmware

    - name: Exibir resumo final
      ansible.builtin.debug:
        msg:
          - "================================================"
          - " VM Provisionada com Sucesso"
          - "================================================"
          - " Servidor"
          - "   FQDN        : {{ host_fqdn }}"
          - "   IP           : {{ host_ip }}"
          - "   Role         : {{ host_role }}"
          - "   Group        : {{ host_group }}"
          - "   Environment  : {{ host_env }}"
          - "   Descricao    : {{ host_description }}"
          - "------------------------------------------------"
          - " Recursos"
          - "   vCPUs        : {{ host_cpu }}"
          - "   RAM          : {{ host_memory }} MB"
          - "   Disk         : {{ host_disk }} GB"
          - "------------------------------------------------"
          - " VM"
          - "   ID           : {{ vm_id }}"
          - "   Path         : {{ vm_path }}"
          - "   Platform     : vmware_fusion"
          - "   Hypervisor   : {{ vmrest_host }}"
          - "   Provisioned  : {{ provisioned_at }}"
          - "   SSH          : OK ({{ host_ip }})"
          - "================================================"
      tags:
        - provisioning
        - vmware

    - name: Exportar dados para proximo job template
      ansible.builtin.set_stats:
        data:
          host_name: "{{ host_name }}"
          host_fqdn: "{{ host_fqdn }}"
          host_domain: "{{ host_domain }}"
          host_ip: "{{ host_ip }}"
          host_description: "{{ host_description }}"
          host_role: "{{ host_role }}"
          host_group: "{{ host_group }}"
          host_env: "{{ host_env }}"
          host_cpu: "{{ host_cpu }}"
          host_memory: "{{ host_memory }}"
          host_disk: "{{ host_disk }}"
          vm_id: "{{ vm_id }}"
          vm_path: "{{ vm_path }}"
          vm_platform: "vmware_fusion"
          vm_hypervisor: "{{ vmrest_host }}"
          provisioned_by: "ansible"
          provisioned_at: "{{ provisioned_at }}"
          sn_short_description: >-
            Provisioned VM {{ host_fqdn }} ({{ host_ip }})
          sn_description: >-
            Server: {{ host_fqdn }}
            | IP: {{ host_ip }}
            | Role: {{ host_role }}
            | Group: {{ host_group }}
            | Environment: {{ host_env }}
            | vCPUs: {{ host_cpu }}
            | RAM: {{ host_memory }} MB
            | Disk: {{ host_disk }} GB
            | Platform: vmware_fusion
            | Hypervisor: {{ vmrest_host }}
            | Provisioned at: {{ provisioned_at }}
      tags:
        - provisioning
        - vmware
        - export
