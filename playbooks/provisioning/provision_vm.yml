---
# =============================================================================
# Playbook: Provisionar VM no VMware Fusion via vmrest API
# Descricao: Clona template, configura recursos, liga a VM e aguarda SSH
#
# Variaveis para Survey do AAP:
#   host_name        - Nome curto do host (ex: server03) [obrigatorio]
#   host_domain      - Dominio do host (default: aroque.com.br)
#   host_ip          - IP do host (ex: 192.168.100.50) [obrigatorio]
#   host_description - Descricao do host (default: Provisioned by Ansible)
#   host_role        - Role/funcao do servidor (webserver | database | app | bastion)
#   host_group       - Grupo do servidor (lab | prod | staging)
#   host_env         - Ambiente (lab | dev | staging | production)
#   host_cpus        - Numero de vCPUs (default: 2)
#   host_memory_mb   - Memoria RAM em MB (default: 2048)
#   host_disk        - Disco (informativo para CMDB, ex: 40GB)
#
# Credenciais (injetadas via CRED-VMWARE-ROQUE, credential type: VMware Fusion REST API):
#   vmrest_host      - IP do hypervisor (extra_vars via injector)
#   vmrest_port      - Porta do vmrest (extra_vars via injector, default: 8698)
#   vmrest_user      - Usuario vmrest (extra_vars via injector)
#   vmrest_password  - Senha vmrest (extra_vars via injector, secret)
# =============================================================================
- name: Provisionar VM no VMware Fusion
  hosts: localhost
  gather_facts: false

  vars:
    host_name: ""
    host_domain: "aroque.com.br"
    host_ip: ""
    host_description: "Provisioned by Ansible"
    host_role: "webserver"
    host_group: "lab"
    host_env: "lab"
    host_cpus: 2
    host_memory_mb: 2048
    host_disk: ""
    vm_template_id: "FOVC332SCFEC425PKT21OGQM5UEETP0A"
    # vmrest_* injetados pelo credential type VMware Fusion REST API (id: 36)
    # NAO definir defaults aqui — os valores vem da credencial CRED-VMWARE-ROQUE
    vmrest_base_url: "http://{{ vmrest_host }}:{{ vmrest_port }}/api"
    vmrest_content_type: "application/vnd.vmware.vmw.rest-v1+json"

  tasks:
    # ── Validacao ────────────────────────────────────────────────────────────
    - name: Validar variaveis obrigatorias
      ansible.builtin.assert:
        that:
          - host_name | length > 0
          - host_ip | length > 0
          - vmrest_user | length > 0
          - vmrest_password | length > 0
        fail_msg: "As variaveis host_name, host_ip, vmrest_user e vmrest_password sao obrigatorias"
        quiet: true
      tags:
        - provisioning
        - vmware
        - validate

    - name: Construir FQDN do host
      ansible.builtin.set_fact:
        host_fqdn: "{{ host_name.split('.')[0] }}.{{ host_domain }}"
      tags:
        - provisioning
        - vmware

    # ── Verificar se VM ja existe ────────────────────────────────────────────
    - name: Listar VMs existentes
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms"
        method: GET
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        return_content: true
      register: vm_list
      tags:
        - provisioning
        - vmware

    - name: Verificar se VM {{ host_fqdn }} ja existe
      ansible.builtin.set_fact:
        vm_exists: "{{ vm_list.json | selectattr('path', 'search', host_fqdn) | list | length > 0 }}"
        vm_existing_id: "{{ (vm_list.json | selectattr('path', 'search', host_fqdn) | list | first).id | default('') }}"
      tags:
        - provisioning
        - vmware

    - name: Informar que VM ja existe
      ansible.builtin.debug:
        msg: "VM {{ host_fqdn }} ja existe (ID: {{ vm_existing_id }}). Pulando clone."
      when: vm_exists | bool
      tags:
        - provisioning
        - vmware

    # ── Clonar template ──────────────────────────────────────────────────────
    - name: Clonar VM a partir do template
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms"
        method: POST
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "{{ vmrest_content_type }}"
        body: "{{ {'name': host_fqdn, 'parentId': vm_template_id} | to_json }}"
        status_code:
          - 200
          - 201
        return_content: true
      register: vm_clone
      when: not (vm_exists | bool)
      tags:
        - provisioning
        - vmware
        - clone

    - name: Registrar ID da VM
      ansible.builtin.set_fact:
        vm_id: "{{ vm_clone.json.id | default(vm_existing_id) }}"
      tags:
        - provisioning
        - vmware

    - name: Exibir resultado do clone
      ansible.builtin.debug:
        msg: "VM {{ host_fqdn }} clonada com sucesso (ID: {{ vm_id }})"
      when: not (vm_exists | bool)
      tags:
        - provisioning
        - vmware

    # ── Configurar recursos da VM ────────────────────────────────────────────
    - name: Configurar vCPUs ({{ host_cpus }}) e memoria ({{ host_memory_mb }} MB)
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}"
        method: PUT
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "{{ vmrest_content_type }}"
        body: "{{ {'processors': host_cpus | int, 'memory': host_memory_mb | int} | to_json }}"
        status_code:
          - 200
          - 201
        return_content: true
      register: vm_config
      tags:
        - provisioning
        - vmware
        - config

    # ── Ligar a VM ───────────────────────────────────────────────────────────
    - name: Verificar estado atual da VM
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}/power"
        method: GET
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        return_content: true
      register: vm_power_state
      tags:
        - provisioning
        - vmware

    - name: Ligar VM {{ host_fqdn }}
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}/power"
        method: PUT
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "{{ vmrest_content_type }}"
        body: "on"
        status_code:
          - 200
          - 201
        return_content: true
      when: vm_power_state.json.power_state | default('') != 'poweredOn'
      register: vm_power_on
      tags:
        - provisioning
        - vmware

    # ── Aguardar VM obter IP via DHCP ───────────────────────────────────────
    - name: Aguardar VM obter IP via vmrest (DHCP)
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}/ip"
        method: GET
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        return_content: true
      register: vm_ip_result
      until: vm_ip_result.status == 200 and vm_ip_result.json.ip | default('') | length > 0
      retries: 30
      delay: 10
      tags:
        - provisioning
        - vmware

    - name: Registrar IP temporario (DHCP) da VM
      ansible.builtin.set_fact:
        vm_dhcp_ip: "{{ vm_ip_result.json.ip }}"
      tags:
        - provisioning
        - vmware

    - name: Exibir IP temporario da VM
      ansible.builtin.debug:
        msg: "VM {{ host_fqdn }} obteve IP via DHCP: {{ vm_dhcp_ip }}"
      tags:
        - provisioning
        - vmware

    # ── Aguardar SSH no IP DHCP ──────────────────────────────────────────────
    - name: Aguardar SSH estar disponivel em {{ vm_dhcp_ip }} (porta 22)
      ansible.builtin.wait_for:
        host: "{{ vm_dhcp_ip }}"
        port: 22
        timeout: 120
        delay: 5
        state: started
      tags:
        - provisioning
        - vmware
        - validate

    # ── Adicionar VM ao inventario dinamico para configuracao ────────────────
    - name: Adicionar VM ao inventario temporario
      ansible.builtin.add_host:
        name: "{{ vm_dhcp_ip }}"
        groups: vm_newly_provisioned
        ansible_user: ansible
        host_fqdn: "{{ host_fqdn }}"
        host_ip_target: "{{ host_ip }}"
        host_name_short: "{{ host_name.split('.')[0] }}"
      tags:
        - provisioning
        - vmware

    # ── Coletar detalhes confirmados da VM ───────────────────────────────────
    - name: Consultar configuracao final da VM
      ansible.builtin.uri:
        url: "{{ vmrest_base_url }}/vms/{{ vm_id }}"
        method: GET
        url_username: "{{ vmrest_user }}"
        url_password: "{{ vmrest_password }}"
        force_basic_auth: true
        return_content: true
      register: vm_details
      tags:
        - provisioning
        - vmware

    - name: Obter path da VM provisionada
      ansible.builtin.set_fact:
        vm_path: "{{ (vm_list.json | selectattr('id', 'equalto', vm_id) | list | first).path | default('') }}"
      tags:
        - provisioning
        - vmware

    - name: Registrar timestamp do provisionamento
      ansible.builtin.set_fact:
        provisioned_at: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
      tags:
        - provisioning
        - vmware

    # ── Resumo parcial (pre-configuracao) ────────────────────────────────────
    - name: Exibir resumo do provisionamento
      ansible.builtin.debug:
        msg:
          - "================================================"
          - " VM Provisionada — Aguardando configuracao"
          - "================================================"
          - " FQDN        : {{ host_fqdn }}"
          - " IP DHCP     : {{ vm_dhcp_ip }}"
          - " IP Target   : {{ host_ip }}"
          - " Role        : {{ host_role }}"
          - " Group       : {{ host_group }}"
          - " vCPUs       : {{ vm_details.json.cpu.processors | default(host_cpus) }}"
          - " RAM         : {{ vm_details.json.memory | default(host_memory_mb) }} MB"
          - " VM ID       : {{ vm_id }}"
          - "================================================"
      tags:
        - provisioning
        - vmware

# ── Play 2: Configurar hostname e IP estatico na VM ──────────────────────────
- name: Configurar hostname e IP estatico na VM provisionada
  hosts: vm_newly_provisioned
  gather_facts: true
  become: true

  tasks:
    - name: Configurar hostname
      ansible.builtin.hostname:
        name: "{{ host_fqdn }}"
      tags:
        - provisioning
        - vmware
        - config

    - name: Detectar nome da interface de rede principal
      ansible.builtin.set_fact:
        net_interface: "{{ ansible_default_ipv4.interface }}"
      tags:
        - provisioning
        - vmware
        - config

    - name: Configurar IP estatico via nmcli
      community.general.nmcli:
        conn_name: "{{ net_interface }}"
        ifname: "{{ net_interface }}"
        type: ethernet
        ip4: "{{ host_ip_target }}/24"
        gw4: "192.168.100.1"
        dns4:
          - "192.168.100.11"
        method4: manual
        state: present
        autoconnect: true
      notify: Reiniciar interface de rede
      tags:
        - provisioning
        - vmware
        - config

    - name: Forcar aplicacao da configuracao de rede
      ansible.builtin.meta: flush_handlers

    - name: Aguardar SSH no IP estatico {{ host_ip_target }}
      ansible.builtin.wait_for:
        host: "{{ host_ip_target }}"
        port: 22
        timeout: 120
        delay: 5
        state: started
      delegate_to: localhost
      become: false
      tags:
        - provisioning
        - vmware
        - validate

    - name: Exibir configuracao concluida
      ansible.builtin.debug:
        msg: "VM {{ host_fqdn }} configurada com IP {{ host_ip_target }} — SSH OK"
      delegate_to: localhost
      become: false
      tags:
        - provisioning
        - vmware

  handlers:
    - name: Reiniciar interface de rede
      community.general.nmcli:
        conn_name: "{{ net_interface }}"
        state: present
        autoconnect: true

# ── Play 3: Exportar dados para workflow ──────────────────────────────────────
- name: Exportar dados do provisionamento para workflow
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Registrar timestamp do provisionamento
      ansible.builtin.set_fact:
        provisioned_at: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
      tags:
        - provisioning
        - vmware

    - name: Exibir resumo final
      ansible.builtin.debug:
        msg:
          - "================================================"
          - " VM Provisionada com Sucesso"
          - "================================================"
          - " Servidor"
          - "   FQDN        : {{ host_fqdn }}"
          - "   IP           : {{ host_ip }}"
          - "   Role         : {{ host_role }}"
          - "   Group        : {{ host_group }}"
          - "   Environment  : {{ host_env }}"
          - "   Descricao    : {{ host_description }}"
          - "------------------------------------------------"
          - " Recursos"
          - "   vCPUs        : {{ host_cpus }}"
          - "   RAM          : {{ host_memory_mb }} MB"
          - "   Disk         : {{ host_disk | default('N/A') }}"
          - "------------------------------------------------"
          - " VM"
          - "   ID           : {{ vm_id }}"
          - "   VM Path      : {{ vm_path }}"
          - "   Platform     : vmware_fusion"
          - "   Hypervisor   : {{ vmrest_host }}"
          - "   Provisioned  : {{ provisioned_at }}"
          - "   SSH          : OK"
          - "================================================"
      tags:
        - provisioning
        - vmware

    - name: Exportar dados para proximo job template
      ansible.builtin.set_stats:
        data:
          host_name: "{{ host_name }}"
          host_fqdn: "{{ host_fqdn }}"
          host_domain: "{{ host_domain }}"
          host_ip: "{{ host_ip }}"
          host_description: "{{ host_description }}"
          host_role: "{{ host_role }}"
          host_group: "{{ host_group }}"
          host_env: "{{ host_env }}"
          host_cpus: "{{ host_cpus }}"
          host_memory_mb: "{{ host_memory_mb }}"
          host_disk: "{{ host_disk }}"
          vm_id: "{{ vm_id }}"
          vm_path: "{{ vm_path }}"
          vm_platform: "vmware_fusion"
          vm_hypervisor: "{{ vmrest_host }}"
          provisioned_by: "ansible"
          provisioned_at: "{{ provisioned_at }}"
          sn_short_description: >-
            Provisioned VM {{ host_fqdn }} ({{ host_ip }})
          sn_description: >-
            Server: {{ host_fqdn }}
            | IP: {{ host_ip }}
            | Role: {{ host_role }}
            | Group: {{ host_group }}
            | Environment: {{ host_env }}
            | vCPUs: {{ host_cpus }}
            | RAM: {{ host_memory_mb }} MB
            | Disk: {{ host_disk | default('N/A') }}
            | Platform: vmware_fusion
            | Hypervisor: {{ vmrest_host }}
            | Provisioned at: {{ provisioned_at }}
      tags:
        - provisioning
        - vmware
        - export
