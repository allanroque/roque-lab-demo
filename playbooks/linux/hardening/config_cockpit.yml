---
# Playbook: Configure Cockpit on RHEL Systems
# Variables (AAP Survey):
#   - (none required)
# Tags: cockpit, firewall

- name: Configure Cockpit on RHEL Systems
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Enable and start Cockpit socket
      ansible.builtin.systemd:
        name: cockpit.socket
        state: started
        enabled: true
        daemon_reload: true
      tags:
        - cockpit

    - name: Open firewall for Cockpit
      ansible.posix.firewalld:
        service: cockpit
        permanent: true
        state: enabled
        immediate: true
      tags:
        - cockpit
        - firewall

    - name: Ensure cockpit service is running
      ansible.builtin.systemd:
        name: cockpit
        state: started
        enabled: true
      failed_when: false
      tags:
        - cockpit
