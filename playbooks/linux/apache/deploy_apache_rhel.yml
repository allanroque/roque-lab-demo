---
# Playbook: Deploy Apache Web Server no RHEL
# Descricao: Instala e configura Apache httpd com porta customizavel e pagina de teste
#
# Variaveis Survey AAP:
#   - apache_port: Porta de escuta do Apache (default: 80)
#   - apache_test_message: Mensagem exibida na pagina de teste (default: Apache Test Message)
- name: Deploy Apache Web Server no RHEL
  hosts: all
  become: true
  gather_facts: true

  vars:
    apache_port: 80
    apache_doc_root: /var/www/html
    apache_test_message: "Apache Test Message"

  tasks:
    # ── Pre-requisitos ───────────────────────────────────────────────────────
    - name: Parar e desabilitar Nginx se estiver ativo (conflito porta 80)
      ansible.builtin.systemd:
        name: nginx
        state: stopped
        enabled: false
      failed_when: false
      tags:
        - apache
        - pre

    # ── Instalacao ───────────────────────────────────────────────────────────
    - name: Instalar Apache httpd e mod_ssl
      ansible.builtin.dnf:
        name:
          - httpd
          - mod_ssl
        state: present
      tags:
        - apache
        - install

    # ── Configuracao ─────────────────────────────────────────────────────────
    - name: Configurar porta do Apache
      ansible.builtin.lineinfile:
        path: /etc/httpd/conf/httpd.conf
        regexp: "^Listen "
        line: "Listen {{ apache_port }}"
      notify: Reiniciar Apache
      tags:
        - apache
        - config

    - name: Definir ServerName
      ansible.builtin.lineinfile:
        path: /etc/httpd/conf/httpd.conf
        regexp: "^#?ServerName "
        line: "ServerName {{ ansible_fqdn }}:{{ apache_port }}"
      notify: Reiniciar Apache
      tags:
        - apache
        - config

    - name: Deploy da pagina de teste (index.html)
      ansible.builtin.template:
        src: index.html.j2
        dest: "{{ apache_doc_root }}/index.html"
        owner: root
        group: root
        mode: "0644"
      tags:
        - apache
        - config

    # ── SELinux ──────────────────────────────────────────────────────────────
    - name: Permitir Apache em porta customizada (SELinux)
      community.general.seport:
        ports: "{{ apache_port }}"
        proto: tcp
        setype: http_port_t
        state: present
      when: apache_port | int != 80
      tags:
        - apache
        - selinux

    # ── Firewalld ────────────────────────────────────────────────────────────
    - name: Coletar facts de servicos
      ansible.builtin.service_facts:
      tags:
        - apache
        - firewall

    - name: Permitir porta do Apache no firewalld
      ansible.posix.firewalld:
        port: "{{ apache_port }}/tcp"
        permanent: true
        state: enabled
        immediate: true
      when:
        - ansible_facts.services['firewalld.service'] is defined
        - ansible_facts.services['firewalld.service']['state'] == 'running'
      tags:
        - apache
        - firewall

    # ── Servico ──────────────────────────────────────────────────────────────
    - name: Garantir Apache habilitado e em execucao
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true
      tags:
        - apache

    # ── Validacao ─────────────────────────────────────────────────────────────
    - name: Validar pagina web com teste HTTP
      ansible.builtin.uri:
        url: "http://{{ ansible_fqdn | default(inventory_hostname) }}:{{ apache_port }}"
        return_content: false
        status_code: 200
      register: http_result
      tags:
        - apache
        - validate

    - name: Exibir resumo do Apache
      ansible.builtin.debug:
        msg:
          - "Apache instalado e configurado"
          - "Host       : {{ ansible_hostname }}"
          - "Port       : {{ apache_port }}"
          - "HTTP test  : {{ http_result.status }}"
          - "URL        : http://{{ ansible_fqdn | default(inventory_hostname) }}:{{ apache_port }}"
      tags:
        - apache
        - validate

  handlers:
    - name: Reiniciar Apache
      ansible.builtin.service:
        name: httpd
        state: restarted

  post_tasks:
    - name: Exportar informacoes do Apache para workflow (set_stats)
      ansible.builtin.set_stats:
        aggregate: false
        data:
          stats_apache_hosts: "{{ ansible_play_hosts }}"
          stats_apache_port: "{{ apache_port }}"
          stats_apache_url: "http://{{ ansible_host }}:{{ apache_port }}"
          stats_service_status: "running"
          stats_phase: "apache_ready"
      tags:
        - apache
