---
# Playbook: Configurar DNS em interfaces gerenciadas pelo NetworkManager (RHEL 9)
# Variables (suitable for AAP Survey):
#   dns_servers:       list/string - DNS servers to configure (e.g., ["8.8.8.8", "1.1.1.1"])
#   target_interface:  string      - Network interface to configure (default: primary interface)
- name: Configurar DNS em interfaces gerenciadas pelo NetworkManager (RHEL 9)
  hosts: all
  ignore_unreachable: true
  become: true
  gather_facts: true

  vars:
    dns_servers:
    target_interface: "{{ ansible_default_ipv4.interface }}"

  tasks:
    - name: Garantir que o NetworkManager esta instalado e ativo
      ansible.builtin.service:
        name: NetworkManager
        state: started
        enabled: true
      tags:
        - dns
        - networkmanager

    - name: Verificar tipo de dns_servers
      ansible.builtin.debug:
        msg: "dns_servers={{ dns_servers }}, tipo={{ dns_servers | type_debug }}"
      tags:
        - dns
        - debug

    - name: Normalizar dns_servers como lista (caso seja string simples)
      ansible.builtin.set_fact:
        dns_servers_list: "{{ [dns_servers] if dns_servers is string else dns_servers }}"
      tags:
        - dns

    - name: Exibir DNS final que sera aplicado
      ansible.builtin.debug:
        msg: "Aplicando DNS: {{ dns_servers_list | join(' ') }} na interface {{ target_interface }}"
      tags:
        - dns
        - debug

    - name: Obter nome da conexao ativa com a interface-alvo
      ansible.builtin.command:
        cmd: nmcli -t -f NAME,DEVICE connection show --active
      register: nmcli_connections
      changed_when: false
      tags:
        - dns

    - name: Extrair nome da conexao da interface alvo
      ansible.builtin.set_fact:
        active_connection_name: >-
          {{ nmcli_connections.stdout_lines
             | select('search', target_interface)
             | map('regex_replace', ':.*', '')
             | first }}
      tags:
        - dns

    - name: Configurar DNS via nmcli (modo estatico)
      community.general.nmcli:
        conn_name: "{{ active_connection_name }}"
        type: ethernet
        dns4: "{{ dns_servers_list }}"
        dns4_ignore_auto: true
        state: present
      tags:
        - dns
        - configure

    - name: Reiniciar a conexao de rede para aplicar DNS
      ansible.builtin.command:
        cmd: "nmcli connection up '{{ active_connection_name }}'"
      changed_when: true
      tags:
        - dns
        - apply
