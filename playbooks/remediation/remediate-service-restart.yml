---
# =========================================================================
# Playbook: Remediacao - Restart de Servico
# =========================================================================
# Variaveis para AAP Survey:
#   target_host  - Host ou grupo alvo (default: all)
#   service      - Nome do servico a reiniciar (default: httpd)
# =========================================================================
- name: Remediacao - Restart de servico
  hosts: "{{ target_host | default('all') }}"
  ignore_unreachable: true
  become: true
  gather_facts: false
  vars:
    service: httpd

  tasks:
    - name: Verificar status atual do servico {{ service }}
      ansible.builtin.systemd:
        name: "{{ service }}"
      register: service_status_before
      changed_when: false
      tags:
        - remediation
        - service
        - check

    - name: Exibir status inicial do servico
      ansible.builtin.debug:
        msg: "{{ service }} status: {{ service_status_before.status.ActiveState }}"
      tags:
        - remediation
        - service
        - debug

    - name: Coletar logs recentes do servico via journalctl
      ansible.builtin.command: "journalctl -u {{ service }} -n 20 --no-pager"
      register: service_logs
      changed_when: false
      failed_when: false
      tags:
        - remediation
        - service
        - logs

    - name: Exibir logs recentes do servico
      ansible.builtin.debug:
        msg: "Recent {{ service }} logs:\n{{ service_logs.stdout }}"
      tags:
        - remediation
        - service
        - debug

    - name: Reiniciar servico {{ service }}
      ansible.builtin.systemd:
        name: "{{ service }}"
        state: restarted
        daemon_reload: true
      register: service_restart
      tags:
        - remediation
        - service
        - restart

    - name: Habilitar na inicializacao o servico {{ service }}
      ansible.builtin.systemd:
        name: "{{ service }}"
        enabled: true
      tags:
        - remediation
        - service

    - name: Aguardar estabilizacao do servico
      ansible.builtin.pause:
        seconds: 5
      tags:
        - remediation
        - service

    - name: Verificar se servico esta ativo apos restart
      ansible.builtin.systemd:
        name: "{{ service }}"
      register: service_status_after
      changed_when: false
      tags:
        - remediation
        - service
        - check

    - name: Exibir status final do servico
      ansible.builtin.debug:
        msg: "{{ service }} status: {{ service_status_after.status.ActiveState }}"
      tags:
        - remediation
        - service
        - debug

    - name: Verificar saude HTTP do servico web
      ansible.builtin.uri:
        url: "http://localhost:80/"
        method: GET
        status_code: [200, 301, 302, 403]
      register: http_health
      changed_when: false
      when: service == 'httpd' or service == 'nginx'
      ignore_errors: true
      tags:
        - remediation
        - service
        - healthcheck

    - name: Exibir resultado do health check HTTP
      ansible.builtin.debug:
        msg: "HTTP health check: {{ http_health.status | default('N/A') }}"
      when: service == 'httpd' or service == 'nginx'
      tags:
        - remediation
        - service
        - debug

    - name: Exibir relatorio de restart do servico
      ansible.builtin.debug:
        msg:
          - "=== SERVICE RESTART REPORT ==="
          - "Service: {{ service }}"
          - "Initial status: {{ service_status_before.status.ActiveState }}"
          - "Final status: {{ service_status_after.status.ActiveState }}"
          - "Restart successful: {{ service_restart.changed }}"
          - "HTTP status: {{ http_health.status | default('N/A') }}"
      tags:
        - remediation
        - service
        - report
